name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Run unit tests
        run: cargo test --lib --bins

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Run integration tests
        run: cargo test --test cli_workflows

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage report
        run: |
          mkdir -p coverage
          cargo llvm-cov \
            --workspace \
            --all-features \
            --lcov \
            --output-path coverage/lcov.info \
            --fail-under-lines 80
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage

  npm-package:
    name: npm Package
    runs-on: ubuntu-latest
    env:
      TODOUI_SKIP_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install npm dependencies
        run: npm ci
      - name: Verify npm packaging scripts
        run: |
          npm run build
          npm test
      - name: Build local binary
        run: cargo build --locked
      - name: Smoke-test launcher
        env:
          TODOUI_BINARY_PATH: ${{ github.workspace }}/target/debug/todui
        run: node bin/todui.js --help
